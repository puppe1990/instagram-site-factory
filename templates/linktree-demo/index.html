<!DOCTYPE html>
<html lang="pt-BR" data-style="{{PROFILE_STYLE}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{DISPLAY_NAME}} | Links</title>
    <meta name="description" content="{{SEO_DESCRIPTION}}" />
    <meta property="og:title" content="{{DISPLAY_NAME}}" />
    <meta property="og:description" content="{{SEO_DESCRIPTION}}" />
    <meta property="og:url" content="{{OG_URL}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="{{FONT_LINK}}" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    {{THEME_OVERRIDE}}
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("linktree-theme");
          var theme =
            stored ||
            (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div class="demo-ribbon">
      Demonstração — link na bio gerado do Instagram @{{USERNAME}}
    </div>

    <button
      class="theme-toggle"
      type="button"
      aria-label="Alternar tema claro e escuro"
      aria-pressed="false"
    >
      <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2" />
        <path d="M12 20v2" />
        <path d="M4.93 4.93l1.41 1.41" />
        <path d="M17.66 17.66l1.41 1.41" />
        <path d="M2 12h2" />
        <path d="M20 12h2" />
        <path d="M4.93 19.07l1.41-1.41" />
        <path d="M17.66 6.34l1.41-1.41" />
      </svg>
      <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
    </button>

    <main class="page">
      <header class="profile">
        <div class="profile__frame-wrap">
          <div class="profile__glow" aria-hidden="true"></div>
          <div class="profile__frame">
            <img src="{{AVATAR_IMAGE}}" alt="{{BUSINESS_NAME}}" />
          </div>
        </div>
        <p class="profile__eyebrow">{{CATEGORY}}</p>
        <h1 class="profile__title">{{HERO_TITLE}}</h1>
        <p class="profile__bio">{{BIO}}</p>
      </header>

      <nav class="links" aria-label="Links principais">{{LINKS_HTML}}</nav>

      <footer class="site-footer">
        <a href="{{INSTAGRAM_URL}}" target="_blank" rel="noopener">@{{USERNAME}}</a>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
